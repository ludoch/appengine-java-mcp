# App Engine Java MCP Server - Spring Boot configuration
# Most runtime config lives in appengine-web.xml env-variables (for App Engine)
# or in .env (for local development via dotenv-java).

server.port=${PORT:8080}

# Disable Spring Boot's banner in logs (cleaner for MCP stdio mode)
spring.main.banner-mode=off

# Logging
logging.level.com.google.cloud.appengine.mcp=INFO
logging.level.com.google.cloud=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

# Spring MVC async timeout (App Engine standard caps at 10 min = 600000 ms)
spring.mvc.async.request-timeout=580000

# Jackson
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null
